<title>Typewriter Lyrics</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

#container{
    text-align:center;
}

#lyrics{
    width:90%;
    max-width:900px;
    margin:auto;
    font-size:2rem;
    line-height:1.6;
    white-space:pre-wrap;
    word-wrap:break-word;
}

button{
    margin-top:30px;
    padding:12px 28px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#fff;
    color:#000;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

button:disabled{
    opacity:.5;
    cursor:default;
}

.cursor{
    display:inline-block;
    width:3px;
    height:1em;
    background:#fff;
    margin-left:3px;
    animation:blink .8s infinite;
    vertical-align:bottom;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}
</style>
</head>
<body>
  <!-- Place this inside the <body> -->
<audio id="bgMusic" preload="auto">
    <source controls src="Recorded voice.mp3" type="audio/mpeg">
    <source controls src="Recorded voice.mp3" type="audio/wav">
    Your browser does not support the audio element.
</audio>
</body>

const music = document.getElementById("bgMusic");

music.volume = 2.0;   // 0.0 to 1.0
music.loop = false;   // true = repeat music

// =========================
// START BUTTON
// =========================
startBtn.addEventListener("click", async () => {
    startBtn.disabled = true;
    startBtn.style.display = "none";

    // Reset music to the beginning
    music.currentTime = 0;

    // Play music
    try {
        await music.play();
    } catch (err) {
        console.log("Music couldn't play:", err);

    text.textContent = "";

});

const typingSpeed = 60;

const text = document.getElementById("text");
const startBtn = document.getElementById("startBtn");

let line = 0;

function typeLine(index){
    if(index < lyrics[line].text.length){
        text.textContent += lyrics[line].text.charAt(index);
        setTimeout(() => typeLine(index + 1), typingSpeed);
    }else{
        setTimeout(() => {
            line++;

            if(line < lyrics.length){
                text.textContent = "";
                typeLine(0);
            }
        }, lyrics[line].delay);
    }
}

startBtn.addEventListener("click", () => {
    startBtn.disabled = true;
    startBtn.style.display = "none";
    text.textContent = "";
    line = 0;
    typeLine(0);
